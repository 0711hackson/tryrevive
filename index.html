<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tryrevive — revive from now</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 手写体字体：非阻塞加载（网络不通时自动回退系统楷体，不影响首屏） -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Caveat:wght@400;700&display=swap"
          rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23fff'/></svg>">
</head>
<body data-page="home">

    <!-- 1. 登录/注册页面 -->
    <div id="auth-page" class="page auth-page hidden">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-mark"></div>
                <h1 class="logo-text">tryrevive</h1>
            </div>
            <p class="auth-subtitle">重新掌控你的注意力</p>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <input type="text" id="login-username" placeholder="用户名 / 邮箱" required>
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="密码" required>
                </div>
                <button type="submit" class="btn-primary">进入 tryrevive</button>
            </form>

            <form id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <input type="text" id="register-username" placeholder="创建用户名" required>
                </div>
                <div class="form-group">
                    <input type="email" id="register-email" placeholder="邮箱（可选）">
                </div>
                <div class="form-group">
                    <input type="password" id="register-password" placeholder="设置密码" required>
                </div>
                <button type="submit" class="btn-primary">开始我的旅程</button>
            </form>

            <button id="guest-btn" class="guest-skip" type="button">先以游客身份体验 →</button>

            <p class="auth-footer">revive from now</p>
        </div>
    </div>

    <!-- 2. 问卷页面 -->
    <div id="questionnaire-page" class="page questionnaire-page hidden">
        <div class="questionnaire-container">
            <div class="question-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="progress-text" id="progress-text">1 / 5</span>
            </div>

            <div id="question-content" class="question-content">
                <!-- 问题动态注入 -->
            </div>

            <div class="question-nav">
                <button id="prev-btn" class="btn-ghost">上一题</button>
                <button id="next-btn" class="btn-primary">下一题</button>
            </div>
        </div>
    </div>

    <!-- 3. 主页面（首页 · Google 式极简） -->
    <div id="home-page" class="page home-page">
        <!-- 顶部：仅设置按钮 -->
        <header class="top-bar minimal">
            <button id="settings-btn" class="icon-btn" title="设置">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </header>

        <!-- 中央 Hero：字标 + 搜索栏 + 常用 APP -->
        <main class="hero">
            <h1 class="hero-wordmark">tryrevive</h1>
            <p class="hero-slogan">reborn from now · 别让互联网偷走你的人生</p>

            <div class="search-bar hero-search">
                <select id="platform-select" class="platform-select" title="选择平台">
                    <option value="bilibili">🔵 B 站</option>
                    <option value="xiaohongshu">🔴 小红书</option>
                    <option value="douyin">⚫ 抖音</option>
                    <option value="netease">🟢 网易云</option>
                    <option value="web">🌐 网页</option>
                </select>
                <input type="text" id="search-input" class="search-input" placeholder="带着目的去搜索，而不是被填喂...">
                <button id="search-btn" class="search-btn" title="搜索">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="7"/>
                        <path d="m21 21-4.3-4.3"/>
                    </svg>
                </button>
            </div>

            <!-- 常用 APP Dock -->
            <section class="apps-section hero-dock">
                <div class="apps-grid" id="apps-grid">
                    <!-- APP 动态注入 -->
                </div>
                <div class="apps-header dock-actions">
                    <button id="add-app-btn" class="add-app-btn" title="添加应用">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        添加
                    </button>
                    <button id="edit-apps-btn" class="edit-apps-btn" title="编辑应用">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        编辑
                    </button>
                </div>
            </section>
        </main>

        <!-- 桌宠：左下角行走的小人 -->
        <div class="pet-corner" id="pet-corner">
            <!-- 状态提问气泡 -->
            <div class="question-bubble hidden" id="question-bubble">
                <p id="bubble-text">最近感觉怎么样？</p>
                <div class="bubble-options">
                    <button class="bubble-option" data-feeling="good">还不错 ☀️</button>
                    <button class="bubble-option" data-feeling="okay">一般吧 🌿</button>
                    <button class="bubble-option" data-feeling="low">有点累 🌙</button>
                </div>
            </div>

            <!-- 水滩层（眼泪汇聚） -->
            <div class="puddle-layer" id="puddle-layer"></div>

            <!-- 火柴人容器 -->
            <div class="stickman-wrapper" id="stickman-wrapper">
                <svg id="stickman-svg" class="stickman" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
                    <!-- 阴影 -->
                    <ellipse class="shadow" cx="50" cy="122" rx="20" ry="5"/>
                    <!-- 左腿 -->
                    <ellipse class="leg leg-left" cx="42" cy="108" rx="7" ry="10"/>
                    <!-- 右腿 -->
                    <ellipse class="leg leg-right" cx="58" cy="108" rx="7" ry="10"/>
                    <!-- 身体（圆嘟嘟水滴形） -->
                    <ellipse class="body" cx="50" cy="78" rx="22" ry="26"/>
                    <!-- 左臂 -->
                    <ellipse class="arm arm-left" cx="27" cy="76" rx="6" ry="12"/>
                    <!-- 右臂 -->
                    <ellipse class="arm arm-right" cx="73" cy="76" rx="6" ry="12"/>
                    <!-- 头部（大圆头） -->
                    <circle class="head" cx="50" cy="32" r="22"/>
                    <!-- 眼泪（黑色状态显示） -->
                    <g class="tears-group" id="tears-group">
                        <ellipse class="tear tear-1" cx="43" cy="52" rx="2" ry="3.5"/>
                        <ellipse class="tear tear-2" cx="57" cy="52" rx="2" ry="3.5"/>
                    </g>
                </svg>

                <!-- 眼泪滴落动画层 -->
                <div class="tear-drop-layer" id="tear-drop-layer"></div>
            </div>

            <!-- 状态文字 -->
            <div class="status-message" id="status-message">
                <p class="message-text" id="message-text">正在慢慢找回自己的节奏</p>
            </div>

            <!-- 状态切换（迷你圆点） -->
            <div class="state-switcher">
                <button class="state-btn" data-state="black" title="娱乐过度 · 沉重">
                    <span class="state-btn-dot dot-black"></span>
                    <span class="state-btn-label">沉重</span>
                </button>
                <button class="state-btn" data-state="gray" title="疗愈中">
                    <span class="state-btn-dot dot-gray"></span>
                    <span class="state-btn-label">疗愈</span>
                </button>
                <button class="state-btn" data-state="white" title="健康状态 · 轻盈">
                    <span class="state-btn-dot dot-white"></span>
                    <span class="state-btn-label">轻盈</span>
                </button>
            </div>
        </div>

        <!-- 水波纹层（覆盖整个首页，鼠标移动触发） -->
        <div class="ripple-layer" id="ripple-layer"></div>

        <!-- 设置面板 -->
        <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-content">
                <button id="close-settings" class="close-btn">×</button>
                <h3>偏好设置</h3>
                <div class="setting-group">
                    <label>主题颜色</label>
                    <div class="color-picker" id="color-picker">
                        <button class="color-btn" data-color="#4a90e2" style="background: linear-gradient(135deg,#4a90e2,#7bb3f0)"></button>
                        <button class="color-btn" data-color="#e2b44a" style="background: linear-gradient(135deg,#e2b44a,#f0d47b)"></button>
                        <button class="color-btn" data-color="#e24a90" style="background: linear-gradient(135deg,#e24a90,#f07bb3)"></button>
                        <button class="color-btn" data-color="#4ae2b4" style="background: linear-gradient(135deg,#4ae2b4,#7bf0d4)"></button>
                        <button class="color-btn" data-color="#b44ae2" style="background: linear-gradient(135deg,#b44ae2,#d47bf0)"></button>
                        <button class="color-btn" data-color="#888888" style="background: linear-gradient(135deg,#666,#aaa)"></button>
                    </div>
                </div>
                <div class="setting-group">
                    <label>MBTI 人格</label>
                    <select id="mbti-select" class="mbti-select">
                        <option value="">未设置</option>
                        <option value="INTJ">INTJ — 建筑师</option>
                        <option value="INTP">INTP — 逻辑学家</option>
                        <option value="ENTJ">ENTJ — 指挥官</option>
                        <option value="ENTP">ENTP — 辩论家</option>
                        <option value="INFJ">INFJ — 提倡者</option>
                        <option value="INFP">INFP — 调停者</option>
                        <option value="ENFJ">ENFJ — 主人公</option>
                        <option value="ENFP">ENFP — 竞选者</option>
                        <option value="ISTJ">ISTJ — 物流师</option>
                        <option value="ISFJ">ISFJ — 守卫者</option>
                        <option value="ESTJ">ESTJ — 总经理</option>
                        <option value="ESFJ">ESFJ — 执政官</option>
                        <option value="ISTP">ISTP — 鉴赏家</option>
                        <option value="ISFP">ISFP — 探险家</option>
                        <option value="ESTP">ESTP — 企业家</option>
                        <option value="ESFP">ESFP — 表演者</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>重置所有数据</label>
                    <button id="reset-btn" class="btn-danger">重置</button>
                </div>
            </div>
        </div>

        <!-- 底部 slogan -->
        <footer class="footer">
            <p class="slogan">revive from now</p>
        </footer>

        <!-- 冥想唤起按钮（Siri风格，平时隐藏） -->
        <button class="siri-button hidden" id="siri-button" title="给自己一个暂停">
            <span class="siri-button-glow"></span>
        </button>
    </div>

    <!-- 冥想空间页面 -->
    <div class="meditation-page hidden" id="meditation-page">
        <div class="meditation-stars" id="meditation-stars"></div>
        <div class="meditation-shooting-stars" id="meditation-shooting-stars"></div>
        <div class="meditation-bubbles" id="meditation-bubbles"></div>
        <button class="meditation-close" id="meditation-close" title="退出">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <button class="meditation-trigger-btn" id="meditation-trigger-btn" title="与自己对话">
            <span class="meditation-btn-inner"></span>
        </button>
    </div>

    <script src="js/data.js"></script>
    <script src="js/questionnaire.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/meditation.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
